# EmberHound — status.emberhound.com
# Upptime config. Monitors run every 5 minutes from GitHub Actions in
# the buggyde/emberhound-status repo.
#
# Why this lives in its own repo (not in the EmberHound app repo):
# the status page MUST stay reachable when our primary infrastructure
# is degraded. Hosting it on GitHub Pages with monitors firing from
# GitHub Actions gives us that property by construction.

owner: buggyde
repo: emberhound-status

sites:
  - name: Cloud Console
    url: https://emberhound.com
    expectedStatusCodes:
      - 200

  - name: API / Edge Functions
    # Public no-auth health endpoint — see supabase/functions/health/
    # in the EmberHound-Portal/emberhound repo (PR #642). No DB calls;
    # responds in < 500ms.
    url: https://ibdkgzvygjbbaylxorhm.supabase.co/functions/v1/health
    expectedStatusCodes:
      - 200

  - name: Agent Ingestion
    # agent-contract is a public no-auth GET that returns the published
    # contract metadata device agents download. Natural proxy for
    # "agent comms layer is up".
    url: https://ibdkgzvygjbbaylxorhm.supabase.co/functions/v1/agent-contract
    expectedStatusCodes:
      - 200

  - name: Authentication
    # Supabase Auth health endpoint. Returns 200 with apikey header,
    # or 401 without it. We accept either — both mean the auth gateway
    # is responding and not 5xx'ing. 5xx or timeout is the real
    # failure mode we want to catch.
    url: https://ibdkgzvygjbbaylxorhm.supabase.co/auth/v1/health
    expectedStatusCodes:
      - 200
      - 401

status-website:
  cname: status.emberhound.com
  name: EmberHound
  logoUrl: https://emberhound.com/logo-icon.png
  introTitle: EmberHound Service Status
  introMessage: >-
    Real-time and historical status of EmberHound services. Monitored
    every five minutes from an independent GitHub Actions workflow.
    For security issues, contact security@emberhound.com.
  navbar:
    - title: Status
      href: /
    - title: Trust Center
      href: https://emberhound.com/trust
    - title: Report a vulnerability
      href: mailto:security@emberhound.com

assignees:
  - buggyde
